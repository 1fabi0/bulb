name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from conventional commit
        uses: TriPSs/conventional-changelog-action@v6
        id: version
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-commit: true

  build-docker:
    runs-on: ubuntu-latest
    needs: version
    if: ${{ needs.version.outputs.version != '' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./src
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-chart:
    runs-on: ubuntu-latest
    needs: version
    if: ${{ needs.version.outputs.version != '' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Update chart version
        run: |
          sed -i "s/^version: .*/version: ${{ needs.version.outputs.version }}/" chart/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ needs.version.outputs.version }}\"/" chart/Chart.yaml

      - name: Update chart dependencies
        run: |
          helm dependency update chart

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package chart --destination dist

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR
        run: |
          helm push dist/bulb-${{ needs.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts